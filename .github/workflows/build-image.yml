name: Build and Push Docker Image

on:
  workflow_dispatch:
    inputs:
      openclaw_version:
        description: 'OpenClaw version to build (branch, tag, or commit SHA)'
        required: false
        default: 'main'
        type: string
      push_image:
        description: 'Push image to registry'
        required: false
        default: true
        type: boolean
  push:
    branches:
      - main
    paths:
      - 'Dockerfile'
      - '.github/workflows/build-image.yml'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/openclaw-docker

jobs:
  Prepare:
    name: Prepare Environment
    runs-on: ubuntu-latest
    outputs:
      image_name: ${{ steps.prepare.outputs.image_name }}
      d_image_name: ${{ steps.prepare.outputs.d_image_name }}
      openclaw_version: ${{ steps.prepare.outputs.openclaw_version }}
      should_push: ${{ steps.prepare.outputs.should_push }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@main

      - name: Prepare build variables
        id: prepare
        run: |
          IMAGE_NAME=$(echo "$IMAGE_NAME" | tr '[:upper:]' '[:lower:]')
          D_IMAGE_NAME=$(echo "$IMAGE_NAME" | cut -d'/' -f2)

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            OPENCLAW_VERSION="${{ inputs.openclaw_version }}"
          else
            if [ -f ".last-openclaw-version" ] && [ -s ".last-openclaw-version" ]; then
              OPENCLAW_VERSION=$(cat .last-openclaw-version)
            else
              OPENCLAW_VERSION=main
            fi
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.push_image }}" != "true" ]; then
            SHOULD_PUSH=false
          else
            SHOULD_PUSH=true
          fi

          echo "image_name=$IMAGE_NAME" >> $GITHUB_OUTPUT
          echo "d_image_name=$D_IMAGE_NAME" >> $GITHUB_OUTPUT
          echo "openclaw_version=$OPENCLAW_VERSION" >> $GITHUB_OUTPUT
          echo "should_push=$SHOULD_PUSH" >> $GITHUB_OUTPUT

  Build-and-Push:
    name: Build and Push ${{ matrix.platform }}
    needs: Prepare
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            tag_suffix: amd64
          # - platform: linux/386
          #   runner: ubuntu-latest
          #   tag_suffix: i386
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            tag_suffix: arm64
          # - platform: linux/arm/v7
          #   runner: ubuntu-latest
          #   tag_suffix: armv7
          # - platform: linux/arm/v6
          #   runner: ubuntu-latest
          #   tag_suffix: armv6
          # - platform: linux/ppc64le
          #   runner: ubuntu-latest
          #   tag_suffix: ppc64le
          # - platform: linux/riscv64
          #   runner: ubuntu-latest
          #   tag_suffix: riscv64
          # - platform: linux/s390x
          #   runner: ubuntu-latest
          #   tag_suffix: s390x

    steps:
      - name: Free Disk-Space
        run: |
          df -h
          sudo apt-get clean
          docker system prune -a -f
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc
          df -h

      - name: Checkout
        uses: actions/checkout@main

      - name: Set up Docker QEMU
        uses: docker/setup-qemu-action@master

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@master

      - name: Login to Registry
        if: needs.Prepare.outputs.should_push == 'true'
        uses: docker/login-action@master
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: Build and push
        if: needs.Prepare.outputs.should_push == 'true'
        uses: docker/build-push-action@master
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ needs.Prepare.outputs.image_name }}:${{ github.sha }}-${{ matrix.tag_suffix }}
          build-args: |
            OPENCLAW_VERSION=${{ needs.Prepare.outputs.openclaw_version }}

      - name: Build without push
        if: needs.Prepare.outputs.should_push != 'true'
        uses: docker/build-push-action@master
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          push: false
          build-args: |
            OPENCLAW_VERSION=${{ needs.Prepare.outputs.openclaw_version }}

  Merge-and-Push:
    name: Merge architectures and push latest
    needs:
      - Prepare
      - Build-and-Push
    runs-on: ubuntu-latest
    if: always() && needs.Prepare.outputs.should_push == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@main

      - name: Login to Registry
        uses: docker/login-action@master
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@master

      - name: Create and push manifest list
        id: push
        run: |
          TAGS=("amd64" "i386" "arm64" "armv7" "armv6" "ppc64le" "riscv64" "s390x")
          SUCCESSFUL_IMAGES=""
          SUCCESSFUL_TAGS=""
          for tag in "${TAGS[@]}"; do
            IMAGE_REF="${{ env.REGISTRY }}/${{ needs.Prepare.outputs.image_name }}:${{ github.sha }}-$tag"
            echo "Checking for image: $IMAGE_REF"
            if docker buildx imagetools inspect "$IMAGE_REF" > /dev/null 2>&1; then
              echo "Image found. Adding to merge list."
              SUCCESSFUL_IMAGES="$SUCCESSFUL_IMAGES $IMAGE_REF"
              SUCCESSFUL_TAGS="$SUCCESSFUL_TAGS $tag"
            else
              echo "Image not found for tag $tag. It may have failed to build."
            fi
          done

          echo "SUCCESSFUL_IMAGES=$SUCCESSFUL_IMAGES" >> $GITHUB_ENV
          echo "SUCCESSFUL_TAGS=$SUCCESSFUL_TAGS" >> $GITHUB_ENV

          if [ -n "$SUCCESSFUL_IMAGES" ]; then
            echo "Merging the following images into manifest tags: $SUCCESSFUL_IMAGES"
            docker buildx imagetools create \
              --tag ${{ env.REGISTRY }}/${{ needs.Prepare.outputs.image_name }}:latest \
              --tag ${{ env.REGISTRY }}/${{ needs.Prepare.outputs.image_name }}:${{ github.sha }} \
              $SUCCESSFUL_IMAGES
          else
            echo "No successful images found to merge."
            exit 1
          fi

      - name: Delete Temporary Images
        run: |
          if [ -n "$SUCCESSFUL_IMAGES" ]; then
            echo "Deleting temporary images: $SUCCESSFUL_IMAGES"

            for image in $SUCCESSFUL_IMAGES; do
              echo "Processing image: $image"

              tag=$(echo "$image" | cut -d':' -f2)
              echo "Extracting tag: $tag from image: $image"

              echo "Deleting tag: $tag via API..."

              VERSION_RESPONSE=$(curl -s \
                -H "Authorization: token ${{ github.token }}" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/users/${{ github.repository_owner }}/packages/container/${{ needs.Prepare.outputs.d_image_name }}/versions?per_page=100")

              if [ $? -eq 0 ]; then
                VERSION_ID=$(echo "$VERSION_RESPONSE" | jq -r --arg tag "$tag" '.[] | select(((.metadata.container.tags // []) | index($tag)) != null) | .id')

                if [ "$VERSION_ID" != "null" ] && [ -n "$VERSION_ID" ]; then
                  echo "Found version ID: $VERSION_ID for tag: $tag"

                  DELETE_RESPONSE=$(curl -s -X DELETE \
                    -H "Authorization: token ${{ github.token }}" \
                    -H "Accept: application/vnd.github+json" \
                    "https://api.github.com/users/${{ github.repository_owner }}/packages/container/${{ needs.Prepare.outputs.d_image_name }}/versions/$VERSION_ID")

                  if [ $? -eq 0 ]; then
                    echo "Successfully deleted temporary image: $image (tag: $tag)"
                  else
                    echo "Failed to delete image: $image (tag: $tag). Response: $DELETE_RESPONSE"
                  fi
                else
                  echo "Could not find version ID for tag: $tag"
                fi
              else
                echo "Failed to get versions for image: $image. Response: $VERSION_RESPONSE"
              fi
            done
            
            echo "Temporary images cleanup completed"
          else
            echo "No temporary images to delete (SUCCESSFUL_IMAGES is empty)"
          fi

      - name: Generate build summary
        run: |
          JOINED_TAGS=$(echo "$SUCCESSFUL_TAGS" | xargs)
          JOINED_TAGS=${JOINED_TAGS// /, }
          if [ -z "$JOINED_TAGS" ]; then
            JOINED_TAGS="none"
          fi

          echo "### OpenClaw Docker Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**OpenClaw Version:** \`${{ needs.Prepare.outputs.openclaw_version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Successful Platforms:** \`${JOINED_TAGS}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Registry:** \`${{ env.REGISTRY }}/${{ needs.Prepare.outputs.image_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Manifest Tags:** \`latest\`, \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY

  Delete-Old-Images:
    name: Delete old Docker images
    needs:
      - Prepare
      - Merge-and-Push
    runs-on: ubuntu-latest
    if: needs.Prepare.outputs.should_push == 'true' && needs.Merge-and-Push.result == 'success'
    steps:
      - name: Delete old package versions
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PACKAGE_NAME: ${{ needs.Prepare.outputs.d_image_name }}
          CURRENT_SHA_TAG: ${{ github.sha }}
        run: |
          VERSION_RESPONSE=$(curl -fsSL \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/users/${{ github.repository_owner }}/packages/container/${PACKAGE_NAME}/versions?per_page=100")

          CURRENT_VERSION_IDS=$(echo "$VERSION_RESPONSE" | jq -r --arg current_sha "$CURRENT_SHA_TAG" '
            .[]
            | select(((.metadata.container.tags // []) | index($current_sha)) != null)
            | .id
          ')

          if [ -z "$CURRENT_VERSION_IDS" ]; then
            echo "Current tag ${CURRENT_SHA_TAG} is not visible in the package API yet. Skipping cleanup to avoid deleting the new image."
            exit 0
          fi

          DELETE_IDS=$(echo "$VERSION_RESPONSE" | jq -r --arg current_sha "$CURRENT_SHA_TAG" '
            .[]
            | select(
                (((.metadata.container.tags // []) | index($current_sha)) == null) and
                (((.metadata.container.tags // []) | index("latest")) == null)
              )
            | .id
          ')

          if [ -z "$DELETE_IDS" ]; then
            echo "No old package versions to delete."
            exit 0
          fi

          for version_id in $DELETE_IDS; do
            VERSION_TAGS=$(echo "$VERSION_RESPONSE" | jq -r --arg version_id "$version_id" '
              .[]
              | select((.id | tostring) == $version_id)
              | ((.metadata.container.tags // []) | join(", "))
            ')

            if [ -z "$VERSION_TAGS" ]; then
              VERSION_TAGS="<none>"
            fi

            echo "Deleting package version ${version_id} (tags: ${VERSION_TAGS})"
            curl -fsSL -X DELETE \
              -H "Authorization: token $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/users/${{ github.repository_owner }}/packages/container/${PACKAGE_NAME}/versions/${version_id}"
          done

  Summary-No-Push:
    name: Summary Without Push
    needs:
      - Prepare
      - Build-and-Push
    runs-on: ubuntu-latest
    if: always() && needs.Prepare.outputs.should_push != 'true'
    steps:
      - name: Generate build summary
        run: |
          echo "### OpenClaw Docker Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**OpenClaw Version:** \`${{ needs.Prepare.outputs.openclaw_version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Attempted Platforms:** \`amd64, arm64\`" >> $GITHUB_STEP_SUMMARY
          echo "Manual build completed without pushing images to GHCR." >> $GITHUB_STEP_SUMMARY

  Finalize:
    name: Finalize Workflow
    runs-on: ubuntu-latest
    needs:
      - Build-and-Push
      - Merge-and-Push
      - Delete-Old-Images
      - Summary-No-Push
    if: always()
    steps:
      - name: Delete old workflow runs
        uses: Mattraks/delete-workflow-runs@main
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 0

