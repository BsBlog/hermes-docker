name: Build and Push Docker Image

on:
  workflow_dispatch:
    inputs:
      openclaw_version:
        description: 'OpenClaw version to build (branch, tag, or commit SHA)'
        required: false
        default: 'main'
        type: string
      push_image:
        description: 'Push image to registry'
        required: false
        default: true
        type: boolean
  push:
    branches:
      - main
    paths:
      - 'Dockerfile'
      - '.github/workflows/build-image.yml'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/openclaw-docker
  CACHE_SCOPE_PREFIX: openclaw-build

jobs:
  Prepare:
    name: Prepare Environment
    runs-on: ubuntu-slim
    permissions:
      contents: read
    outputs:
      image_name: ${{ steps.prepare.outputs.image_name }}
      d_image_name: ${{ steps.prepare.outputs.d_image_name }}
      openclaw_version: ${{ steps.prepare.outputs.openclaw_version }}
      should_push: ${{ steps.prepare.outputs.should_push }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@main

      - name: Prepare build variables
        id: prepare
        run: |
          IMAGE_NAME=$(echo "$IMAGE_NAME" | tr '[:upper:]' '[:lower:]')
          D_IMAGE_NAME=$(echo "$IMAGE_NAME" | cut -d'/' -f2)

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            OPENCLAW_VERSION="${{ inputs.openclaw_version }}"
          else
            if [ -f ".last-openclaw-version" ] && [ -s ".last-openclaw-version" ]; then
              OPENCLAW_VERSION=$(cat .last-openclaw-version)
            else
              OPENCLAW_VERSION=main
            fi
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.push_image }}" != "true" ]; then
            SHOULD_PUSH=false
          else
            SHOULD_PUSH=true
          fi

          echo "image_name=$IMAGE_NAME" >> $GITHUB_OUTPUT
          echo "d_image_name=$D_IMAGE_NAME" >> $GITHUB_OUTPUT
          echo "openclaw_version=$OPENCLAW_VERSION" >> $GITHUB_OUTPUT
          echo "should_push=$SHOULD_PUSH" >> $GITHUB_OUTPUT

  Detect-Platforms:
    name: Detect Buildable Platform ${{ matrix.platform }}
    needs: Prepare
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-slim
            tag_suffix: amd64
          # - platform: linux/386
          #   runner: ubuntu-slim
          #   tag_suffix: i386
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            tag_suffix: arm64
          # - platform: linux/arm/v7
          #   runner: ubuntu-slim
          #   tag_suffix: armv7
          # - platform: linux/arm/v6
          #   runner: ubuntu-slim
          #   tag_suffix: armv6
          # - platform: linux/ppc64le
          #   runner: ubuntu-slim
          #   tag_suffix: ppc64le
          # - platform: linux/riscv64
          #   runner: ubuntu-slim
          #   tag_suffix: riscv64
          # - platform: linux/s390x
          #   runner: ubuntu-slim
          #   tag_suffix: s390x

    steps:
      - name: Free Disk-Space
        continue-on-error: true
        run: |
          df -h || true
          sudo apt-get clean || true
          docker system prune -a -f || true
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc || true
          df -h || true

      - name: Checkout
        uses: actions/checkout@main

      - name: Set up Docker QEMU
        uses: docker/setup-qemu-action@master

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@master

      - name: Probe platform and warm cache
        id: detect_build
        continue-on-error: true
        env:
          DOCKER_BUILD_RECORD_UPLOAD: false
          DOCKER_BUILD_SUMMARY: false
        uses: docker/build-push-action@master
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          push: false
          outputs: type=cacheonly
          cache-from: type=gha,scope=${{ env.CACHE_SCOPE_PREFIX }}-${{ matrix.tag_suffix }}
          cache-to: type=gha,mode=max,scope=${{ env.CACHE_SCOPE_PREFIX }}-${{ matrix.tag_suffix }}
          build-args: |
            OPENCLAW_VERSION=${{ needs.Prepare.outputs.openclaw_version }}

      - name: Record platform result
        if: always()
        shell: bash
        run: |
          mkdir -p .platform-success
          STATUS=failed
          if [ "${{ steps.detect_build.outcome }}" = "success" ]; then
            STATUS=success
          fi

          cat > ".platform-success/${{ matrix.tag_suffix }}.env" <<EOF
          PLATFORM=${{ matrix.platform }}
          TAG_SUFFIX=${{ matrix.tag_suffix }}
          STATUS=${STATUS}
          CACHE_FROM=type=gha,scope=${{ env.CACHE_SCOPE_PREFIX }}-${{ matrix.tag_suffix }}
          EOF

      - name: Upload platform marker
        if: always()
        uses: actions/upload-artifact@main
        with:
          name: platform-${{ matrix.tag_suffix }}
          path: .platform-success/${{ matrix.tag_suffix }}.env
          if-no-files-found: error

      - name: Log skipped platform
        if: steps.detect_build.outcome != 'success'
        run: echo "Skipping ${{ matrix.platform }} because the detection build failed."

  Collect-Platforms:
    name: Collect Successful Platforms
    needs:
      - Prepare
      - Detect-Platforms
    runs-on: ubuntu-slim
    permissions:
      contents: read
    outputs:
      successful_platforms: ${{ steps.collect.outputs.successful_platforms }}
      successful_tags: ${{ steps.collect.outputs.successful_tags }}
      cache_from: ${{ steps.collect.outputs.cache_from }}
    steps:
      - name: Download platform markers
        uses: actions/download-artifact@main
        with:
          pattern: platform-*
          path: .platform-success
          merge-multiple: true

      - name: Collect successful platform outputs
        id: collect
        shell: bash
        run: |
          ORDER=(amd64 i386 arm64 armv7 armv6 ppc64le riscv64 s390x)
          PLATFORMS=()
          TAGS=()
          CACHE_FROM=()

          for tag in "${ORDER[@]}"; do
            FILE=".platform-success/${tag}.env"
            if [ ! -f "$FILE" ]; then
              continue
            fi

            source "$FILE"
            if [ "$STATUS" != "success" ]; then
              continue
            fi

            PLATFORMS+=("$PLATFORM")
            TAGS+=("$TAG_SUFFIX")
            CACHE_FROM+=("$CACHE_FROM")
          done

          PLATFORM_CSV=$(IFS=,; echo "${PLATFORMS[*]}")
          TAG_CSV=$(IFS=,; echo "${TAGS[*]}")

          echo "successful_platforms=$PLATFORM_CSV" >> $GITHUB_OUTPUT
          echo "successful_tags=$TAG_CSV" >> $GITHUB_OUTPUT

          {
            echo "cache_from<<EOF"
            printf '%s\n' "${CACHE_FROM[@]}"
            echo "EOF"
          } >> $GITHUB_OUTPUT

          if [ -z "$PLATFORM_CSV" ] && [ "${{ needs.Prepare.outputs.should_push }}" = "true" ]; then
            echo "No successful platforms detected for a push run."
            exit 1
          fi

  Build-and-Push:
    name: Build and Push Multi-Arch Image
    needs:
      - Prepare
      - Collect-Platforms
    runs-on: ubuntu-slim
    permissions:
      contents: read
      packages: write
    if: needs.Prepare.outputs.should_push == 'true' && needs.Collect-Platforms.outputs.successful_platforms != ''
    steps:
      - name: Free Disk-Space
        run: |
          df -h
          sudo apt-get clean
          docker system prune -a -f
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc
          df -h

      - name: Checkout
        uses: actions/checkout@main

      - name: Set up Docker QEMU
        uses: docker/setup-qemu-action@master

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@master

      - name: Login to Registry
        uses: docker/login-action@master
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: Build and push multi-platform image
        uses: docker/build-push-action@master
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ needs.Collect-Platforms.outputs.successful_platforms }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ needs.Prepare.outputs.image_name }}:latest
            ${{ env.REGISTRY }}/${{ needs.Prepare.outputs.image_name }}:${{ github.sha }}
          cache-from: ${{ needs.Collect-Platforms.outputs.cache_from }}
          cache-to: type=gha,mode=max,scope=${{ env.CACHE_SCOPE_PREFIX }}-release
          build-args: |
            OPENCLAW_VERSION=${{ needs.Prepare.outputs.openclaw_version }}

      - name: Generate build summary
        run: |
          echo "### OpenClaw Docker Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**OpenClaw Version:** \`${{ needs.Prepare.outputs.openclaw_version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Successful Platforms:** \`${{ needs.Collect-Platforms.outputs.successful_tags }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Registry:** \`${{ env.REGISTRY }}/${{ needs.Prepare.outputs.image_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Manifest Tags:** \`latest\`, \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Build Cache:** \`type=gha\`" >> $GITHUB_STEP_SUMMARY

  Delete-Old-Images:
    name: Delete old Docker images
    needs:
      - Prepare
      - Build-and-Push
    runs-on: ubuntu-slim
    permissions:
      contents: read
      packages: write
    if: needs.Prepare.outputs.should_push == 'true' && needs.Build-and-Push.result == 'success'
    steps:
      - name: Delete old package versions after successful push
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PACKAGE_NAME: ${{ needs.Prepare.outputs.d_image_name }}
          CURRENT_SHA_TAG: ${{ github.sha }}
        run: |
          VERSION_RESPONSE=$(curl -fsSL \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/users/${{ github.repository_owner }}/packages/container/${PACKAGE_NAME}/versions?per_page=100")

          CURRENT_VERSION_IDS=$(echo "$VERSION_RESPONSE" | jq -r --arg current_sha "$CURRENT_SHA_TAG" '
            .[]
            | select(((.metadata.container.tags // []) | index($current_sha)) != null)
            | .id
          ')

          if [ -z "$CURRENT_VERSION_IDS" ]; then
            echo "Current tag ${CURRENT_SHA_TAG} is not visible in the package API yet. Skipping cleanup to avoid deleting the new image."
            exit 0
          fi

          DELETE_IDS=$(echo "$VERSION_RESPONSE" | jq -r --arg current_sha "$CURRENT_SHA_TAG" '
            .[]
            | select(
                (((.metadata.container.tags // []) | index($current_sha)) == null) and
                (((.metadata.container.tags // []) | index("latest")) == null)
              )
            | .id
          ')

          if [ -z "$DELETE_IDS" ]; then
            echo "No old package versions to delete."
            exit 0
          fi

          for version_id in $DELETE_IDS; do
            VERSION_TAGS=$(echo "$VERSION_RESPONSE" | jq -r --arg version_id "$version_id" '
              .[]
              | select((.id | tostring) == $version_id)
              | ((.metadata.container.tags // []) | join(", "))
            ')

            if [ -z "$VERSION_TAGS" ]; then
              VERSION_TAGS="<none>"
            fi

            echo "Deleting package version ${version_id} (tags: ${VERSION_TAGS})"
            curl -fsSL -X DELETE \
              -H "Authorization: token $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/users/${{ github.repository_owner }}/packages/container/${PACKAGE_NAME}/versions/${version_id}"
          done

  Summary-No-Push:
    name: Summary Without Push
    needs:
      - Prepare
      - Collect-Platforms
    runs-on: ubuntu-slim
    if: needs.Prepare.outputs.should_push != 'true'
    steps:
      - name: Generate build summary
        run: |
          echo "### OpenClaw Docker Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**OpenClaw Version:** \`${{ needs.Prepare.outputs.openclaw_version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Detected Platforms:** \`${{ needs.Collect-Platforms.outputs.successful_tags }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Build Cache:** \`type=gha\`" >> $GITHUB_STEP_SUMMARY
          echo "Manual build completed without pushing an image to GHCR." >> $GITHUB_STEP_SUMMARY

  Finalize:
    name: Finalize Workflow
    needs:
      - Detect-Platforms
      - Collect-Platforms
      - Build-and-Push
      - Delete-Old-Images
      - Summary-No-Push
    runs-on: ubuntu-slim
    if: always()
    steps:

      - name: Delete all cache
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh cache delete --all --succeed-on-no-caches -R ${{ github.repository }}

      - name: Delete old workflow runs
        uses: Mattraks/delete-workflow-runs@main
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 0