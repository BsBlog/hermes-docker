name: Hermes Release Tracker

on:
  schedule:
    # Check for new Hermes releases every 6 hours
    - cron: '0/5 * * * *'
  workflow_dispatch:

jobs:
  Check-Release:
    name: Check Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      actions: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@main

      - name: Check for new Hermes release
        id: check_release
        run: |
          # Get the latest release from Hermes repository
          LATEST_RELEASE=$(curl -s https://api.github.com/repos/NousResearch/hermes-agent/releases/latest | jq -r '.tag_name // empty')
          
          # Get the latest commit from main branch if no releases
          if [ -z "$LATEST_RELEASE" ]; then
            LATEST_COMMIT=$(curl -s https://api.github.com/repos/NousResearch/hermes-agent/commits/main | jq -r '.sha[:7]')
            LATEST_RELEASE="main-${LATEST_COMMIT}"
          fi
          
          echo "Latest Hermes version: ${LATEST_RELEASE}"
          echo "latest_version=${LATEST_RELEASE}" >> $GITHUB_OUTPUT
          
          # Check if we've already built this version
          if [ -f ".last-hermes-version" ]; then
            LAST_VERSION=$(cat .last-hermes-version)
            echo "Last built version: ${LAST_VERSION}"
            
            if [ "$LATEST_RELEASE" = "$LAST_VERSION" ]; then
              echo "new_release=false" >> $GITHUB_OUTPUT
              echo "No new release found"
            else
              echo "new_release=true" >> $GITHUB_OUTPUT
              echo "New release detected!"
            fi
          else
            echo "new_release=true" >> $GITHUB_OUTPUT
            echo "First run - will build"
          fi

      - name: Update version tracker
        if: steps.check_release.outputs.new_release == 'true'
        run: |
          echo "${{ steps.check_release.outputs.latest_version }}" > .last-hermes-version
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .last-hermes-version
          git diff --quiet && git diff --staged --quiet || git commit -m "Update Hermes version tracker to ${{ steps.check_release.outputs.latest_version }}"
          git push

      - name: Trigger build workflow
        if: steps.check_release.outputs.new_release == 'true'
        uses: actions/github-script@main
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'build-image.yml',
              ref: 'main',
              inputs: {
                hermes_version: '${{ steps.check_release.outputs.latest_version }}',
                push_image: 'true'
              }
            });
            
            console.log('Triggered build workflow for new Hermes release: ${{ steps.check_release.outputs.latest_version }}');

      - name: Create summary
        if: always()
        run: |
          echo "### Hermes Release Check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Latest Hermes Version:** \`${{ steps.check_release.outputs.latest_version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.check_release.outputs.new_release }}" = "true" ]; then
            echo "✅ **New release detected!** Build workflow triggered." >> $GITHUB_STEP_SUMMARY
          else
            echo "ℹ️ No new release. Docker image is up to date." >> $GITHUB_STEP_SUMMARY
          fi

  Finalize:
    name: Finalize Workflow
    runs-on: ubuntu-latest
    needs:
      - Check-Release
    if: always()
    steps:
      - name: Delete old workflow runs
        uses: Mattraks/delete-workflow-runs@main
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: "Hermes Release Tracker"
          retain_days: 0
          keep_minimum_runs: 0
