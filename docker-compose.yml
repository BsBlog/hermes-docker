services:
  hermes-gateway:
    image: ghcr.io/bsblog/hermes-docker:latest
    container_name: hermes-gateway
    restart: unless-stopped
    stdin_open: true
    tty: true
    # Uncomment the following line if running on Synology NAS or other systems with UID/GID issues
    # user: "1000:1000"
    volumes:
      - /opt/hermes:/opt/data
    ports:
      - "8642:8642"
    environment:
      - API_SERVER_ENABLED=true
      - API_SERVER_HOST=0.0.0.0
      - API_SERVER_PORT=8642
      - API_SERVER_KEY=${API_SERVER_KEY:-change-me-local-dev}
    command: ["gateway"]

  hermes-cli:
    image: ghcr.io/bsblog/hermes-docker:latest
    container_name: hermes-cli
    stdin_open: true
    tty: true
    # Uncomment the following line if running on Synology NAS or other systems with UID/GID issues
    # user: "1000:1000"
    volumes:
      - /opt/hermes:/opt/data
    environment:
      - API_SERVER_ENABLED=true
      - API_SERVER_HOST=0.0.0.0
      - API_SERVER_PORT=8642
      - API_SERVER_KEY=${API_SERVER_KEY:-change-me-local-dev}
    profiles:
      - cli
